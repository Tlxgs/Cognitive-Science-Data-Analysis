<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认知偏误检测</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #f5f7fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #1e3c72;
            color: white;
            padding: 20px 28px;
        }
        .header h1 {
            margin: 0;
            font-size: 1.6rem;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            padding: 16px 28px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .toolbar button {
            background: white;
            border: 1px solid #ccd7e6;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #1e3c72;
        }
        .toolbar button.active {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }
        .content {
            padding: 24px 28px;
        }
        .selector {
            background: #f0f2f6;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            color: #1e3c72;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border-radius: 40px;
            border: 1px solid #ccd7e6;
            background: white;
            cursor: pointer;
        }
        button.analyze {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .result {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            border-left: 5px solid #1e3c72;
        }
        .stats {
            font-family: monospace;
            background: #eef2f7;
            padding: 12px;
            border-radius: 14px;
            font-size: 0.9rem;
            margin: 12px 0;
        }
        .conclusion {
            font-weight: 500;
        }
        .data-table {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 6px 8px;
            text-align: left;
        }
        th {
            background: #eef2f7;
            position: sticky;
            top: 0;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding: 12px;
            color: #5b6e8c;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🧠 认知偏误检测</h1>
    </div>
    <div class="toolbar">
        <button id="tabAnalyze" class="active">📊 分析</button>
        <button id="tabData">📋 数据表</button>
    </div>
    <div id="analyzePanel" class="content">
        <div class="selector">
            <label>🔍 选择检测项目：</label>
            <select id="biasSelect">
                <option value="riskLevel">⚖️ 风险水平效应</option>
                <option value="framing">🔄 框架效应</option>
                <option value="emotion">😊 情绪效应</option>
                <option value="peer">👥 从众效应</option>
            </select>
            <button id="analyzeBtn" class="analyze">开始分析</button>
        </div>
        <div id="resultArea">
            <div class="result">
                <h3>📌 结果</h3>
                <p>点击上方按钮，基于数据自动计算。</p>
            </div>
        </div>
    </div>
    <div id="dataPanel" class="content" style="display:none;">
        <div class="result">
            <h3>📋 原始数据（前100行）</h3>
            <div id="dataTableContainer" class="data-table">加载中...</div>
        </div>
    </div>
    <div class="footer">
        📁 dataset.csv 需在同一目录 | 卡方检验 / McNemar
    </div>
</div>

<script>
    let rawData = null;
    let dataLoaded = false;

    // 加载CSV
    function loadCSV() {
        return new Promise((resolve, reject) => {
            Papa.parse("dataset.csv", {
                download: true,
                header: true,
                dynamicTyping: true,
                complete: (results) => {
                    rawData = results.data;
                    dataLoaded = true;
                    resolve(rawData);
                },
                error: (err) => reject(err)
            });
        });
    }

    // 准备数据（添加风险寻求字段）
    function prepareData(data) {
        return data.map(row => {
            let choice = row['FinancialDecisionResp.keys'];
            let riskSeeking = (choice === 1) ? 1 : 0;
            return { ...row, risk_seeking: riskSeeking };
        });
    }

    // 卡方检验 2x2
    function chi2Test(observed) {
        const [[a,b],[c,d]] = observed;
        const total = a+b+c+d;
        const rowSum1 = a+b, rowSum2 = c+d;
        const colSum1 = a+c, colSum2 = b+d;
        const e11 = (rowSum1 * colSum1)/total;
        const e12 = (rowSum1 * colSum2)/total;
        const e21 = (rowSum2 * colSum1)/total;
        const e22 = (rowSum2 * colSum2)/total;
        let chi2 = 0;
        chi2 += (a-e11)**2/e11 + (b-e12)**2/e12 + (c-e21)**2/e21 + (d-e22)**2/e22;
        const p = 1 - chi2CDF(chi2, 1);
        return { chi2, p };
    }
    function chi2CDF(x, df) {
        if(df===1) {
            const z = Math.sqrt(x);
            const t = 1/(1+0.3275911*Math.abs(z));
            const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429;
            const erf = 1 - ((((a5*t + a4)*t + a3)*t + a2)*t + a1)*t * Math.exp(-z*z);
            return 0.5 * (1 + erf * (z>0?1:-1));
        }
        return 0.95;
    }

    // 风险水平效应
    function analyzeRiskLevel(df) {
        const high = df.filter(r => r.risk_level === 'High');
        const low = df.filter(r => r.risk_level === 'Low');
        const highSeek = high.filter(r => r.risk_seeking === 1).length;
        const lowSeek = low.filter(r => r.risk_seeking === 1).length;
        const highRate = highSeek / high.length;
        const lowRate = lowSeek / low.length;
        const table = [[highSeek, high.length-highSeek], [lowSeek, low.length-lowSeek]];
        const { p } = chi2Test(table);
        let conclusion = p<0.05 ? `✅ 显著 (p=${p.toFixed(6)})：高风险寻求 ${(highRate*100).toFixed(1)}% ，低风险寻求 ${(lowRate*100).toFixed(1)}% —— 风险反转偏误` : `❌ 不显著 (p=${p.toFixed(4)})`;
        return { p, highRate, lowRate, conclusion };
    }
    function analyzeFraming(df) {
        const framing = df.filter(r => r.trial_type === 'framing');
        if(!framing.length) return { error: "无framing试次" };
        const gain = framing.filter(r => r.framing === 'Gain');
        const loss = framing.filter(r => r.framing === 'Loss');
        const gainSeek = gain.filter(r => r.risk_seeking===1).length;
        const lossSeek = loss.filter(r => r.risk_seeking===1).length;
        const gainRate = gainSeek/gain.length;
        const lossRate = lossSeek/loss.length;
        const table = [[gainSeek, gain.length-gainSeek], [lossSeek, loss.length-lossSeek]];
        const { p } = chi2Test(table);
        let conclusion = p<0.05 ? `✅ 显著 (p=${p.toFixed(6)})：损失框架寻求 ${(lossRate*100).toFixed(1)}% ，收益框架 ${(gainRate*100).toFixed(1)}%` : `❌ 不显著 (p=${p.toFixed(4)})`;
        return { p, gainRate, lossRate, conclusion };
    }
    function analyzeEmotion(df) {
        const emo = df.filter(r => r.trial_type === 'emotion');
        if(!emo.length) return { error: "无emotion试次" };
        const groups = {
            Positive: emo.filter(r=>r.emotion==='Positive'),
            Neutral: emo.filter(r=>r.emotion==='Neutral'),
            Negative: emo.filter(r=>r.emotion==='Negative')
        };
        const rates = {
            Positive: groups.Positive.length ? groups.Positive.filter(r=>r.risk_seeking===1).length/groups.Positive.length : 0,
            Neutral: groups.Neutral.length ? groups.Neutral.filter(r=>r.risk_seeking===1).length/groups.Neutral.length : 0,
            Negative: groups.Negative.length ? groups.Negative.filter(r=>r.risk_seeking===1).length/groups.Negative.length : 0
        };
        // 2x3卡方
        const obs = [
            [groups.Positive.filter(r=>r.risk_seeking===1).length, groups.Positive.filter(r=>r.risk_seeking===0).length],
            [groups.Neutral.filter(r=>r.risk_seeking===1).length, groups.Neutral.filter(r=>r.risk_seeking===0).length],
            [groups.Negative.filter(r=>r.risk_seeking===1).length, groups.Negative.filter(r=>r.risk_seeking===0).length]
        ];
        let total=0, rowSums=[], colSums=[0,0];
        for(let i=0;i<3;i++) for(let j=0;j<2;j++) total+=obs[i][j];
        for(let i=0;i<3;i++) rowSums[i]=obs[i][0]+obs[i][1];
        for(let j=0;j<2;j++) for(let i=0;i<3;i++) colSums[j]+=obs[i][j];
        let chi2=0;
        for(let i=0;i<3;i++){
            for(let j=0;j<2;j++){
                const exp = (rowSums[i]*colSums[j])/total;
                if(exp>0) chi2 += (obs[i][j]-exp)**2/exp;
            }
        }
        const df = (3-1)*(2-1)=2;
        let p = 1 - Math.exp(-chi2/2)*(1+chi2/2); // 近似
        if(p<0) p=0;
        let conclusion = p<0.05 ? `✅ 显著 (p=${p.toFixed(6)})` : `❌ 不显著 (p=${p.toFixed(4)})`;
        return { p, rates, conclusion };
    }
    function analyzePeer(df) {
        const peer = df.filter(r => r.trial_type === 'peer');
        if(!peer.length) return { error: "无peer试次" };
        const present = peer.filter(r=>r.peer==='Present');
        const absent = peer.filter(r=>r.peer==='Absent');
        const presentSeek = present.filter(r=>r.risk_seeking===1).length;
        const absentSeek = absent.filter(r=>r.risk_seeking===1).length;
        const presentRate = presentSeek/present.length;
        const absentRate = absentSeek/absent.length;
        const table = [[presentSeek, present.length-presentSeek], [absentSeek, absent.length-absentSeek]];
        const { p } = chi2Test(table);
        let conclusion = p<0.05 ? `✅ 显著 (p=${p.toFixed(6)})：有同伴寻求 ${(presentRate*100).toFixed(1)}% ，无同伴 ${(absentRate*100).toFixed(1)}%` : `❌ 不显著 (p=${p.toFixed(4)})`;
        return { p, presentRate, absentRate, conclusion };
    }

    function renderResult(resultObj, biasType) {
        const div = document.getElementById('resultArea');
        if(resultObj.error){
            div.innerHTML = `<div class="result"><h3>⚠️ 错误</h3><p>${resultObj.error}</p></div>`;
            return;
        }
        let statsHtml = "";
        if(biasType === 'riskLevel'){
            statsHtml = `<div class="stats">高风险寻求率: ${(resultObj.highRate*100).toFixed(1)}%<br>低风险寻求率: ${(resultObj.lowRate*100).toFixed(1)}%<br>p = ${resultObj.p.toFixed(6)}</div>`;
        } else if(biasType === 'framing'){
            statsHtml = `<div class="stats">收益框架寻求率: ${(resultObj.gainRate*100).toFixed(1)}%<br>损失框架寻求率: ${(resultObj.lossRate*100).toFixed(1)}%<br>p = ${resultObj.p.toFixed(6)}</div>`;
        } else if(biasType === 'emotion'){
            statsHtml = `<div class="stats">😊 Positive: ${(resultObj.rates.Positive*100).toFixed(1)}%<br>😐 Neutral: ${(resultObj.rates.Neutral*100).toFixed(1)}%<br>😞 Negative: ${(resultObj.rates.Negative*100).toFixed(1)}%<br>p = ${resultObj.p.toFixed(6)}</div>`;
        } else if(biasType === 'peer'){
            statsHtml = `<div class="stats">有同伴寻求率: ${(resultObj.presentRate*100).toFixed(1)}%<br>无同伴寻求率: ${(resultObj.absentRate*100).toFixed(1)}%<br>p = ${resultObj.p.toFixed(6)}</div>`;
        }
        div.innerHTML = `<div class="result"><h3>📐 检验结果</h3>${statsHtml}<div class="conclusion">${resultObj.conclusion}</div></div>`;
    }

    // 显示数据表
    function showDataTable() {
        const container = document.getElementById('dataTableContainer');
        if(!rawData){
            container.innerHTML = '加载数据中...';
            loadCSV().then(() => renderTable()).catch(e => container.innerHTML = `错误: ${e.message}`);
        } else {
            renderTable();
        }
        function renderTable() {
            const data = rawData.slice(0,100);
            if(!data.length){ container.innerHTML = '无数据'; return; }
            const cols = Object.keys(data[0]);
            let html = '<table><thead><tr>';
            cols.forEach(c => html+=`<th>${c}</th>`);
            html+='</tr></thead><tbody>';
            data.forEach(row => {
                html+='<tr>';
                cols.forEach(c => html+=`<td>${row[c] ?? ''}</td>`);
                html+='</tr>';
            });
            html+='</tbody></table>';
            container.innerHTML = html;
        }
    }

    // 切换面板
    const analyzePanel = document.getElementById('analyzePanel');
    const dataPanel = document.getElementById('dataPanel');
    const tabAnalyze = document.getElementById('tabAnalyze');
    const tabData = document.getElementById('tabData');

    tabAnalyze.addEventListener('click', () => {
        analyzePanel.style.display = 'block';
        dataPanel.style.display = 'none';
        tabAnalyze.classList.add('active');
        tabData.classList.remove('active');
    });
    tabData.addEventListener('click', () => {
        analyzePanel.style.display = 'none';
        dataPanel.style.display = 'block';
        tabData.classList.add('active');
        tabAnalyze.classList.remove('active');
        showDataTable();
    });

    // 分析按钮
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
        const btn = document.getElementById('analyzeBtn');
        btn.innerText = '加载中...';
        btn.disabled = true;
        if(!dataLoaded){
            try{ await loadCSV(); }catch(e){
                document.getElementById('resultArea').innerHTML = `<div class="result"><h3>❌ 读取失败</h3><p>请确认dataset.csv存在</p></div>`;
                btn.innerText = '开始分析';
                btn.disabled = false;
                return;
            }
        }
        const df = prepareData(rawData);
        const bias = document.getElementById('biasSelect').value;
        let result;
        if(bias === 'riskLevel') result = analyzeRiskLevel(df);
        else if(bias === 'framing') result = analyzeFraming(df);
        else if(bias === 'emotion') result = analyzeEmotion(df);
        else result = analyzePeer(df);
        renderResult(result, bias);
        btn.innerText = '开始分析';
        btn.disabled = false;
    });

    // 预加载
    window.addEventListener('load', () => loadCSV().catch(console.warn));
</script>
</body>
</html>
